function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
  const base64 = (base64String + padding)
    .replace(/-/g, "+")
    .replace(/_/g, "/");

  const rawData = window.atob(base64);
  const outputArray = new Uint8Array(rawData.length);

  for (let i = 0; i < rawData.length; ++i) {
    outputArray[i] = rawData.charCodeAt(i);
  }

  return outputArray;
}

async function enableNotifications() {
  if (!("Notification" in window)) {
    alert("Les notifications ne sont pas supportées sur cet appareil.");
    return;
  }

  if (!("serviceWorker" in navigator)) {
    alert("Service worker non supporté.");
    return;
  }

  if (!("PushManager" in window)) {
    alert("Push non supporté sur cet appareil.");
    return;
  }

  const permission = await Notification.requestPermission();

  if (permission !== "granted") {
    alert("Notifications refusées.");
    return;
  }

  const registration = await navigator.serviceWorker.register("/sw.js");

  const subscription = await registration.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
  });

  const response = await fetch("/.netlify/functions/save-push-subscription", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      subscription,
      userAgent: navigator.userAgent,
    }),
  });

  const result = await response.json();

  if (!response.ok) {
    console.error(result);
    alert("Notifications autorisées, mais abonnement non enregistré.");
    return;
  }

  alert("Notifications activées et enregistrées.");
}
